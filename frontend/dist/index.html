<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeWinOptimizer</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-left titlebar-drag">
        <svg class="cwo-logo" viewBox="0 0 64 64" width="30" height="30">
          <defs>
            <filter id="glow"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          </defs>
          <rect x="3" y="3" width="58" height="58" rx="14" fill="#0a0a0a" stroke="#39ff14" stroke-width="2.5" filter="url(#glow)"/>
          <text x="32" y="41" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="900" fill="#d4ff00" letter-spacing="1">CWO</text>
        </svg>
        <h1>CodeWinOptimizer</h1>
      </div>
      <div class="header-right">
        <div class="lang-toggle" id="lang-toggle">
          <button class="lang-btn active" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="es">ES</button>
        </div>
        <div class="win-controls">
          <button class="win-btn win-min" title="Minimize">&#x2014;</button>
          <button class="win-btn win-max" title="Maximize">&#x25A1;</button>
          <button class="win-btn win-close" title="Close">&#x2715;</button>
        </div>
      </div>
    </header>

    <div id="admin-warning" class="hidden">
      <span>⚠</span>
      <span id="warning-text"></span>
    </div>

    <nav class="tabs">
      <button class="tab active" data-tab="restore"><span class="tab-icon">🔧</span><span id="tab-restore-label">Restore</span></button>
      <button class="tab" data-tab="apps"><span class="tab-icon">📦</span><span id="tab-apps-label">Apps</span></button>
      <button class="tab" data-tab="tweaks"><span class="tab-icon">⚡</span><span id="tab-tweaks-label">Tweaks</span></button>
    </nav>

    <div class="tab-content active" id="tab-restore">
      <div class="panel">
        <h2 id="restore-title">System Restore Point</h2>
        <p id="restore-desc">Create a restore point before making changes to your system. This allows you to revert if something goes wrong.</p>
        <input type="text" id="rp-name" class="rp-name-input" maxlength="64" placeholder="Restore point name">
        <button id="btn-restore" class="btn-primary">
          <span id="btn-restore-text">Create Restore Point</span>
        </button>
      </div>
    </div>

    <div class="tab-content" id="tab-apps">
      <div class="actions-bar">
        <div class="actions-left">
          <div class="pkg-toggle" id="pkg-toggle">
            <button class="pkg-btn active" data-pkg="winget">WinGet</button>
            <button class="pkg-btn" data-pkg="choco">Chocolatey</button>
          </div>
          <span id="apps-count-label"></span>
        </div>
        <button id="btn-install-apps" class="btn-primary">
          <span id="btn-install-text">Install Selected</span>
        </button>
      </div>
      <div id="apps-grid"></div>
    </div>

    <div class="tab-content" id="tab-tweaks">
      <div class="actions-bar">
        <span id="tweaks-count-label"></span>
        <button id="btn-apply-tweaks" class="btn-primary">
          <span id="btn-apply-text">Select tweaks</span>
        </button>
      </div>
      <div id="tweaks-grid"></div>
    </div>

    <div id="terminal">
      <div class="term-header">
        <div class="term-dots">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
        </div>
        <span id="term-title"></span>
        <div class="term-actions">
          <span id="term-status"></span>
          <button id="btn-copy" class="btn-clear">Copy</button>
          <button id="btn-clear" class="btn-clear">Clear</button>
        </div>
      </div>
      <pre id="term-log"></pre>
    </div>
  </div>

  <script src="/wailsjs/runtime/runtime.js" type="module"></script>
  <script src="/main.js" type="module"></script>
</body>
</html>
